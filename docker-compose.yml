services:
  app:
    build:
      context: .
    environment:
      - GEO_USERNAME
      - GEO_PASSWORD
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_HOSTNAME
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    deploy:
      resources:
        limits:
          memory: 500M
    logging:
      driver: local
